name: Deploy Angular site to GitHub Pages

on:
  push:
    branches: ["main"]

# 設定 GITHUB_TOKEN 的權限以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同時間只有一個部署執行中
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        # 設定 base-href 配合 GitHub Pages 的 Repository 名稱路徑
        run: npm run build -- --base-href /__Memory_Match_Master__/

      - name: Copy index.html to 404.html
        # 避免重整頁面時出現 404 Not Found (Angular 單頁應用路由支援)
        run: cp dist/app/browser/index.html dist/app/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/app/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
